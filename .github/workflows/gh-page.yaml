name: Registry

on:
  push:
    branches: [main]
    paths:
      - mkdocs.yml
      - registry/**
  pull_request:
    paths:
      - mkdocs.yml
      - registry/**
  schedule:
    - cron: '0 6 * * *'   # every day at 06:00 UTC
  workflow_dispatch:

jobs:
  docs:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: "pip"

      - name: Configure git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Install requirements
        run: pip install -e '.[docs,scripts]'

      - name: Generate dataset coverage page
        run: python src/dataset_schema_registry/generate_coverage.py

      - name: Commit updated coverage page (push / schedule / dispatch only)
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          git add docs/dataset-coverage.md
          git diff --cached --quiet || git commit -m "chore: update dataset coverage [skip ci]"
          git push

      - name: Build docs
        if: github.event_name == 'pull_request'
        run: mkdocs build -s

      - name: Publish docs
        if: ${{ github.event_name != 'pull_request' }}
        run: mkdocs gh-deploy
